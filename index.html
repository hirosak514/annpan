<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YVLYLXF7L8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-YVLYLXF7L8');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>至高の餡 bread - 匠 Anpan</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #c5a059;
            --card-bg: #151515;
        }

        body { margin: 0; background-color: var(--bg-color); color: var(--text-color); font-family: 'Noto Serif JP', serif; line-height: 1.8; }
        html { scroll-behavior: smooth; }

        nav { position: fixed; top: 0; width: 100%; padding: 20px 50px; display: flex; justify-content: space-between; z-index: 1000; background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(10px); box-sizing: border-box; border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .logo { font-size: 1.5rem; letter-spacing: 4px; color: var(--accent-color); text-decoration: none; font-weight: 600; }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&q=80&w=2000') no-repeat center center/cover; }
        .hero h1 { font-size: 4rem; margin-bottom: 20px; letter-spacing: 10px; }

        section { padding: 120px 10%; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { background: var(--card-bg); padding: 25px; border: 1px solid #222; text-align: center; }
        .card img { width: 100%; height: 250px; object-fit: cover; margin-bottom: 20px; }

        .cta { display: inline-block; padding: 18px 50px; border: 1px solid var(--accent-color); color: var(--accent-color); text-decoration: none; cursor: pointer; background: transparent; transition: 0.3s; font-family: 'Noto Serif JP', serif; }
        .cta:hover { background: var(--accent-color); color: #000; }

        footer { text-align: center; padding: 60px; font-size: 0.8rem; color: #999; border-top: 1px solid #222; }

        /* --- 予約誘導メッセージ（吹き出し）のスタイル --- */
        .ai-fukidashi {
            position: fixed;
            bottom: 100px; /* ボットボタンの少し上 */
            right: 20px;
            background: var(--accent-color);
            color: #000;
            padding: 12px 20px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
        }

        /* 吹き出しのしっぽ */
        .ai-fukidashi::after {
            content: "";
            position: absolute;
            bottom: -10px;
            right: 25px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: var(--accent-color) transparent;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Difyボタン自体の色も高級感のあるゴールドに変更 */
        #dify-chatbot-bubble-button {
            background-color: var(--accent-color) !important;
        }
    </style>
</head>
<body>

    <div class="ai-fukidashi" onclick="openDify()">
        ご予約や商品へのご質問はこちらからどうぞ！
    </div>

    <nav>
        <a href="#" class="logo">匠 -TAKUMI-</a>
    </nav>

    <header class="hero">
        <h1>至高の餡</h1>
        <p>一粒、一粒に、魂を込めて。</p>
        <a href="#menu" class="cta">品書きを拝見</a>
    </header>

    <section id="menu">
        <div class="grid">
            <div class="card">
                <img src="アンパン001.jpg" alt="特選 つぶあん">
                <h3>特選 つぶあん</h3>
                <p>¥540</p>
            </div>
            <div class="card">
                <img src="あんぱん002.jpg" alt="絹ごし こしあん">
                <h3>絹ごし こしあん</h3>
                <p>¥540</p>
            </div>
            <div class="card">
                <img src="あんぱん003.jpg" alt="匠の生地">
                <h3>匠の生地（プレーン）</h3>
                <p>¥400</p>
            </div>
        </div>
    </section>

    <section id="access" style="text-align: center;">
        <h2>お取り扱い</h2>
        <p>茨城県つくば・守谷エリアでの催事準備中。</p>
        <button class="cta" onclick="openDify()">最新の販売予定を確認</button>
    </section>

    <footer>
        <p>&copy; 2026 高級アンパン専門店 匠 -TAKUMI-</p>
    </footer>

    <script>
     window.difyChatbotConfig = {
       token: 'FWW3BzxTmFD0oA3j',
       baseUrl: 'https://udify.app'
     }

     // メッセージをクリックした時にチャットを開く関数
     function openDify() {
         const button = document.getElementById('dify-chatbot-bubble-button');
         if (button) button.click();
     }
    </script>
    <script
     src="https://udify.app/embed.min.js"
     id="FWW3BzxTmFD0oA3j"
     defer>
    </script>
</body>
</html>
