<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YVLYLXF7L8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-YVLYLXF7L8');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>至高の餡 bread - 匠 Anpan</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #c5a059;
            --card-bg: #151515;
        }

        body { margin: 0; background-color: var(--bg-color); color: var(--text-color); font-family: 'Noto Serif JP', serif; line-height: 1.8; }
        html { scroll-behavior: smooth; }

        /* ナビ・ヒーロー・メニュー・お取り扱いセクションのスタイルは前回と同様のため維持 */
        nav { position: fixed; top: 0; width: 100%; padding: 20px 50px; display: flex; justify-content: space-between; z-index: 1000; background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(10px); box-sizing: border-box; border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .logo { font-size: 1.5rem; letter-spacing: 4px; color: var(--accent-color); text-decoration: none; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&q=80&w=2000') no-repeat center center/cover; }
        section { padding: 120px 10%; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { background: var(--card-bg); padding: 25px; border: 1px solid #222; text-align: center; }
        .card img { width: 100%; height: 250px; object-fit: cover; margin-bottom: 20px; }
        .cta { display: inline-block; padding: 18px 50px; border: 1px solid var(--accent-color); color: var(--accent-color); text-decoration: none; cursor: pointer; background: transparent; }

        /* --- AIチャットUI --- */
        #chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
            font-family: sans-serif;
        }

        #chat-button {
            width: 60px;
            height: 60px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        #chat-button:hover { transform: scale(1.1); }

        #chat-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 320px;
            height: 450px;
            background: #1a1a1a;
            border: 1px solid var(--accent-color);
            border-radius: 10px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        #chat-header {
            background: var(--accent-color);
            color: #000;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 0.9rem;
        }

        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .msg.ai { background: #333; align-self: flex-start; }
        .msg.user { background: var(--accent-color); color: #000; align-self: flex-end; }

        #chat-input-area {
            padding: 15px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        #chat-input {
            flex: 1;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 5px;
        }

        #chat-send {
            background: var(--accent-color);
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        footer { text-align: center; padding: 60px; font-size: 0.8rem; color: #999; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">匠 -TAKUMI-</a>
    </nav>

    <header class="hero">
        <h1>至高の餡</h1>
        <p>一粒、一粒に、魂を込めて。</p>
        <a href="#menu" class="cta">品書きを拝見</a>
    </header>

    <section id="menu">
        <div class="grid">
            <div class="card">
                <img src="tsubu-an.jpg" alt="特選 つぶあん">
                <h3>特選 つぶあん</h3>
                <p>¥540</p>
            </div>
            <div class="card">
                <img src="koshi-an.jpg" alt="絹ごし こしあん">
                <h3>絹ごし こしあん</h3>
                <p>¥540</p>
            </div>
            <div class="card">
                <img src="buns.jpg" alt="匠の生地">
                <h3>匠の生地（プレーン）</h3>
                <p>¥400</p>
            </div>
        </div>
    </section>

    <section id="access" style="text-align: center;">
        <h2>お取り扱い</h2>
        <p>つくば・守谷エリアでの催事準備中。</p>
        <button class="cta" id="where-to-buy">どこで買えますか？</button>
    </section>

    <div id="chat-widget">
        <div id="chat-window">
            <div id="chat-header">
                <span>匠 AI案内人</span>
                <span id="close-chat" style="cursor:pointer">×</span>
            </div>
            <div id="chat-messages">
                <div class="msg ai">いらっしゃいませ。匠のアンパンについて何かお手伝いできることはありますか？</div>
            </div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="メッセージを入力...">
                <button id="chat-send">送信</button>
            </div>
        </div>
        <div id="chat-button">
            <span style="color:black; font-size:1.2rem;">匠</span>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 高級アンパン専門店 匠 -TAKUMI-</p>
    </footer>

    <script>
        // --- 既存のGA4計測ロジック ---
        document.getElementById('where-to-buy').addEventListener('click', () => {
            gtag('event', 'click_where_to_buy', { 'event_category': 'engagement' });
            alert('ただいま、つくば・守谷エリアでの出店を準備中です。');
        });

        // --- チャットウィジェットロジック ---
        const chatBtn = document.getElementById('chat-button');
        const chatWin = document.getElementById('chat-window');
        const closeChat = document.getElementById('close-chat');
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');
        const chatMessages = document.getElementById('chat-messages');

        chatBtn.onclick = () => {
            chatWin.style.display = 'flex';
            gtag('event', 'chat_open', { 'event_category': 'engagement' });
        };
        closeChat.onclick = () => chatWin.style.display = 'none';

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function handleChat() {
            const text = chatInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            chatInput.value = '';

            // AI応答のシミュレーション（特定のキーワードに反応）
            setTimeout(() => {
                let reply = "承知いたしました。職人に確認いたします。他に気になることはございますか？";
                
                if (text.includes("どこ") || text.includes("場所") || text.includes("買")) {
                    reply = "現在はつくば・守谷エリアを中心に催事販売を計画しております。具体的な場所が決まり次第、サイトにて告知いたします。";
                } else if (text.includes("値段") || text.includes("いくら")) {
                    reply = "特選つぶあんは540円、プレーン生地は400円でご用意しております。";
                }

                addMessage(reply, 'ai');
                gtag('event', 'chat_response', { 'event_category': 'engagement', 'user_keyword': text });
            }, 1000);
        }

        chatSend.onclick = handleChat;
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') handleChat(); };
    </script>
</body>
</html>
